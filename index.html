    <style>
        :root {
            --color-text: #1a1a1a;
            --color-text-secondary: #666666;
            --color-border: #e5e5e5;
            --color-hover: #0a0a0a;
            --color-accent: #2563eb;
            --color-accent-light: #dbeafe;
            --spacing-unit: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', -apple-system, sans-serif;
            color: var(--color-text);
            background: #fafafa;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .content {
            max-width: 480px;
            width: 100%;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            line-height: 1.1;
            animation: fadeIn 1.2s ease-out 0.1s both;
        }

        .title {
            font-size: clamp(1rem, 2.5vw, 1.125rem);
            color: var(--color-text-secondary);
            margin-bottom: 2rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            animation: fadeIn 1.2s ease-out 0.2s both;
        }

        .tagline {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(1.125rem, 3vw, 1.375rem);
            color: var(--color-text);
            margin-bottom: 2rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.4;
            animation: fadeIn 1.2s ease-out 0.25s both;
        }

        .interests {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 3rem;
            animation: fadeIn 1.2s ease-out 0.3s both;
        }

        .interest-tag {
            background: var(--color-accent-light);
            color: var(--color-text);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9375rem;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .interest-tag:hover {
            background: var(--color-accent);
            color: white;
            transform: translateY(-2px);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0;
            animation: fadeIn 1.2s ease-out 0.4s both;
        }

        .link-item {
            border-top: 1px solid var(--color-border);
            padding: 1.25rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--color-text);
            transition: all 0.3s ease;
            position: relative;
        }

        .link-item:last-child {
            border-bottom: 1px solid var(--color-border);
        }

        .link-item:hover {
            color: var(--color-accent);
            padding-left: 0.5rem;
        }

        .link-item::after {
            content: '→';
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--color-accent);
        }

        .link-item:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        .link-label {
            font-size: 1.0625rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .link-icon {
            width: 20px;
            height: 20px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .link-item:hover .link-icon {
            opacity: 1;
        }

        footer {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            opacity: 0;
            animation: fadeIn 1.2s ease-out 0.6s both;
        }

        .temp-notice {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            font-style: italic;
            opacity: 0;
            animation: fadeIn 1.2s ease-out 0.6s both;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                margin-bottom: 0.25rem;
            }

            .title {
                margin-bottom: 1.5rem;
            }

            .tagline {
                margin-bottom: 1.5rem;
            }

            .interests {
                margin-bottom: 2.5rem;
            }

            footer {
                position: static;
                text-align: center;
                margin-top: 4rem;
                padding: 0 1.5rem;
            }

            .temp-notice {
                position: static;
                text-align: center;
                margin-top: 1.5rem;
                padding: 0 1.5rem;
            }
        }
    </style>
